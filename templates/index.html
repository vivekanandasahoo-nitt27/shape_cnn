<!DOCTYPE html>
<html>
<head>
    <title>Shape Detector</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
            border: 2px solid #eee;
        }

        .result {
            margin-top: 20px;
        }

        .prediction {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .confidence {
            font-size: 18px;
            color: #666;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>🔷 Shape Detector</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if img_path %}
        <img src="{{ img_path }}" width="200">
    {% endif %}

    {% if prediction %}
    <div class="result">
        <div class="prediction">Prediction: {{ prediction }}</div>
        <div class="confidence">Confidence: {{ confidence }}%</div>
    </div>
    {% endif %}
</div>

</body>
</html>
